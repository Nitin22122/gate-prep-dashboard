<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GATE 2027 · Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/style.css" />
    <style>
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .page-header h1 {
            font-size: 1.8rem;
            font-weight: 700;
        }
        .page-header .back-btn {
            color: #8b9bb5;
            text-decoration: none;
            padding: 0.4rem 1rem;
            border: 1px solid #1e2630;
            border-radius: 8px;
            transition: all 0.2s ease;
        }
        .page-header .back-btn:hover {
            border-color: #00f5a0;
            color: #00f5a0;
        }
        .analytics-page-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
        @media (max-width: 768px) {
            .analytics-page-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="page-header">
            <h1>📊 Progress Analytics</h1>
            <a href="/index.html" class="back-btn">← Back</a>
        </div>

        <div class="analytics-page-grid">
            <!-- Overall Progress -->
            <div class="analytics-card">
                <h4>Overall Progress</h4>
                <div class="analytics-chart" id="progress-chart">
                    <div class="chart-bar" id="chart-bar" style="height: 0%;"></div>
                    <span class="chart-label" id="chart-label">0%</span>
                </div>
            </div>

            <!-- Performance Score -->
            <div class="analytics-card">
                <h4>Performance Score</h4>
                <div class="score-display" id="performance-score">0</div>
                <div class="score-label">/ 100</div>
                <div class="score-meter">
                    <div class="score-fill" id="score-fill" style="width: 0%;"></div>
                </div>
            </div>

            <!-- Subject-wise Progress Chart -->
            <div class="analytics-card">
                <h4>Subject Progress</h4>
                <div class="donut-chart-container">
                    <canvas id="progressChart" width="200" height="200"></canvas>
                    <div class="chart-center-text">
                        <span class="chart-percentage" id="chart-percentage">0%</span>
                        <span class="chart-label">Overall</span>
                    </div>
                </div>
            </div>

            <!-- Confidence Meter -->
            <div class="analytics-card">
                <h4>Confidence Meter</h4>
                <div class="confidence-grid" id="confidence-grid">
                    <!-- Confidence meters will be rendered here -->
                </div>
            </div>

            <!-- Performance Trends -->
            <div class="analytics-card">
                <h4>Performance Trends</h4>
                <div class="trend-controls">
                    <button onclick="changeTrendPeriod('week')" class="trend-btn active" id="trend-week">Week</button>
                    <button onclick="changeTrendPeriod('month')" class="trend-btn" id="trend-month">Month</button>
                    <button onclick="changeTrendPeriod('year')" class="trend-btn" id="trend-year">Year</button>
                </div>
                <div class="trend-chart-container">
                    <canvas id="trendChart" width="600" height="200"></canvas>
                </div>
            </div>

            <!-- Time Distribution -->
            <div class="analytics-card">
                <h4>Time Distribution</h4>
                <div class="time-distribution-card-inline">
                    <canvas id="timeDistributionChart" width="200" height="200"></canvas>
                    <div id="distribution-legend" class="distribution-legend"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="/index.html" class="nav-item" data-page="dashboard">
            <span class="nav-icon">🏠</span>
            <span class="nav-label">Home</span>
        </a>
        <a href="/pages/subjects.html" class="nav-item" data-page="subjects">
            <span class="nav-icon">📚</span>
            <span class="nav-label">Subjects</span>
        </a>
        <a href="/pages/analytics.html" class="nav-item active" data-page="analytics">
            <span class="nav-icon">📊</span>
            <span class="nav-label">Analytics</span>
        </a>
        <a href="/pages/tools.html" class="nav-item" data-page="tools">
            <span class="nav-icon">🛠️</span>
            <span class="nav-label">Tools</span>
        </a>
        <a href="/pages/settings.html" class="nav-item" data-page="settings">
            <span class="nav-icon">⚙️</span>
            <span class="nav-label">Settings</span>
        </a>
    </nav>

    <script src="/script.js"></script>
</body>
</html>
