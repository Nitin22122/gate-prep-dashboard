<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GATE 2027 · Goals</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/style.css" />
    <style>
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .page-header h1 {
            font-size: 1.8rem;
            font-weight: 700;
        }
        .page-header .back-btn {
            color: #8b9bb5;
            text-decoration: none;
            padding: 0.4rem 1rem;
            border: 1px solid #1e2630;
            border-radius: 8px;
            transition: all 0.2s ease;
        }
        .page-header .back-btn:hover {
            border-color: #00f5a0;
            color: #00f5a0;
        }
        .goals-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
        @media (max-width: 768px) {
            .goals-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="page-header">
            <h1>🎯 Goals & Challenges</h1>
            <a href="/index.html" class="back-btn">← Back</a>
        </div>

        <div class="goals-grid">
            <!-- Weekly Goals -->
            <div class="weekly-goals-card">
                <h3>📅 Weekly Goals</h3>
                <div class="goal-input-group">
                    <input type="number" id="weekly-goal-input" placeholder="Hours" min="0" step="0.5" value="20" />
                    <span>hours</span>
                    <button onclick="setWeeklyGoal()" class="goal-btn">Set Goal</button>
                </div>
                <div class="goal-progress">
                    <div class="goal-progress-bar" id="weekly-goal-bar" style="width: 0%;"></div>
                    <span class="goal-progress-text" id="weekly-goal-text">0 / 20 hours</span>
                </div>
                <div class="goal-stats">
                    <div class="goal-stat">
                        <span class="goal-stat-label">This Week</span>
                        <span class="goal-stat-value" id="weekly-progress">0h</span>
                    </div>
                    <div class="goal-stat">
                        <span class="goal-stat-label">Remaining</span>
                        <span class="goal-stat-value" id="weekly-remaining">20h</span>
                    </div>
                    <div class="goal-stat">
                        <span class="goal-stat-label">Days Left</span>
                        <span class="goal-stat-value" id="days-left">7</span>
                    </div>
                </div>
            </div>

            <!-- Daily Challenges -->
            <div>
                <h3 style="margin-bottom:1rem;">🏆 Daily Challenges</h3>
                <div class="challenges-grid" id="challenges-grid">
                    <!-- Challenges will be rendered here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="/index.html" class="nav-item" data-page="dashboard">
            <span class="nav-icon">🏠</span>
            <span class="nav-label">Home</span>
        </a>
        <a href="/pages/subjects.html" class="nav-item" data-page="subjects">
            <span class="nav-icon">📚</span>
            <span class="nav-label">Subjects</span>
        </a>
        <a href="/pages/analytics.html" class="nav-item" data-page="analytics">
            <span class="nav-icon">📊</span>
            <span class="nav-label">Analytics</span>
        </a>
        <a href="/pages/tools.html" class="nav-item" data-page="tools">
            <span class="nav-icon">🛠️</span>
            <span class="nav-label">Tools</span>
        </a>
        <a href="/pages/notes.html" class="nav-item" data-page="notes">
            <span class="nav-icon">📝</span>
            <span class="nav-label">Notes</span>
        </a>
        <a href="/pages/settings.html" class="nav-item" data-page="settings">
            <span class="nav-icon">⚙️</span>
            <span class="nav-label">Settings</span>
        </a>
    </nav>

    <script src="/script.js"></script>
</body>
</html>
