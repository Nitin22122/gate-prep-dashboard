<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GATE 2027 · Tools</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/style.css" />
    <style>
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .page-header h1 {
            font-size: 1.8rem;
            font-weight: 700;
        }
        .page-header .back-btn {
            color: #8b9bb5;
            text-decoration: none;
            padding: 0.4rem 1rem;
            border: 1px solid #1e2630;
            border-radius: 8px;
            transition: all 0.2s ease;
        }
        .page-header .back-btn:hover {
            border-color: #00f5a0;
            color: #00f5a0;
        }
        .tools-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
        @media (max-width: 768px) {
            .tools-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="page-header">
            <h1>🛠️ Study Tools</h1>
            <a href="/index.html" class="back-btn">← Back</a>
        </div>

        <div class="tools-grid">
            <!-- Pomodoro Timer -->
            <div class="pomodoro-card">
                <h3>🍅 Pomodoro Timer</h3>
                <div class="pomodoro-display" id="pomodoro-display">25:00</div>
                <div class="pomodoro-controls">
                    <button onclick="startPomodoro()" class="pomodoro-btn start-pomo">▶ Start</button>
                    <button onclick="pausePomodoro()" class="pomodoro-btn pause-pomo" style="display:none;">⏸ Pause</button>
                    <button onclick="resetPomodoro()" class="pomodoro-btn reset-pomo">⟳ Reset</button>
                </div>
                <div class="pomodoro-stats">
                    <div class="pomo-stat">
                        <span>Today's Pomodoros</span>
                        <span id="pomo-count">0</span>
                    </div>
                    <div class="pomo-stat">
                        <span>Total Focus Time</span>
                        <span id="pomo-total-time">0h</span>
                    </div>
                </div>
                <p class="pomo-note">🎯 25 min focus · 5 min break</p>
            </div>

            <!-- Study Music -->
            <div class="music-card">
                <h3>🎧 Focus Music</h3>
                <div class="music-controls">
                    <button onclick="playMusic('lofi')" class="music-btn">🎵 Lofi</button>
                    <button onclick="playMusic('classical')" class="music-btn">🎻 Classical</button>
                    <button onclick="playMusic('nature')" class="music-btn">🌊 Nature</button>
                    <button onclick="stopMusic()" class="music-btn stop-music">⏹ Stop</button>
                </div>
                <div class="music-status" id="music-status">🎵 No music playing</div>
            </div>

            <!-- Flashcards -->
            <div class="flashcard-card">
                <h3>📝 Flashcards</h3>
                <div class="flashcard-controls">
                    <input type="text" id="flashcard-input" placeholder="Term..." />
                    <input type="text" id="flashcard-answer-input" placeholder="Answer..." />
                    <select id="flashcard-subject">
                        <option value="general">General</option>
                        <option value="discrete_maths">DM</option>
                        <option value="c_programming">C</option>
                        <option value="digital_logic">DL</option>
                        <option value="data_structures">DS</option>
                        <option value="algorithms">Algo</option>
                        <option value="os">OS</option>
                        <option value="dbms">DBMS</option>
                        <option value="computer_networks">CN</option>
                    </select>
                    <button onclick="addFlashcard()" class="flashcard-btn">➕ Add</button>
                </div>
                <div id="flashcard-list" class="flashcard-list">
                    <!-- Flashcards will be rendered here -->
                </div>
                <button onclick="startFlashcardReview()" class="review-btn">🔄 Start Review</button>
            </div>

            <!-- Quick Notes -->
            <div class="quick-notes-card">
                <h3>📝 Quick Notes</h3>
                <div class="note-input-group">
                    <input type="text" id="note-input" placeholder="Write a quick note..." />
                    <select id="note-subject">
                        <option value="general">General</option>
                        <option value="discrete_maths">DM</option>
                        <option value="c_programming">C</option>
                        <option value="digital_logic">DL</option>
                        <option value="data_structures">DS</option>
                        <option value="algorithms">Algo</option>
                        <option value="os">OS</option>
                        <option value="dbms">DBMS</option>
                        <option value="computer_networks">CN</option>
                    </select>
                    <button onclick="addQuickNote()" class="note-btn">Add Note</button>
                </div>
                <div id="notes-list" class="notes-list">
                    <!-- Notes will be rendered here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="/index.html" class="nav-item" data-page="dashboard">
            <span class="nav-icon">🏠</span>
            <span class="nav-label">Home</span>
        </a>
        <a href="/pages/subjects.html" class="nav-item" data-page="subjects">
            <span class="nav-icon">📚</span>
            <span class="nav-label">Subjects</span>
        </a>
        <a href="/pages/analytics.html" class="nav-item" data-page="analytics">
            <span class="nav-icon">📊</span>
            <span class="nav-label">Analytics</span>
        </a>
        <a href="/pages/tools.html" class="nav-item active" data-page="tools">
            <span class="nav-icon">🛠️</span>
            <span class="nav-label">Tools</span>
        </a>
        <a href="/pages/settings.html" class="nav-item" data-page="settings">
            <span class="nav-icon">⚙️</span>
            <span class="nav-label">Settings</span>
        </a>
    </nav>

    <script src="/script.js"></script>
</body>
</html>
