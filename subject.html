<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Subject Tracker · GATE 2027</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/style.css" />
    <style>
        /* ============================================
           SUBJECT TRACKER PAGE SPECIFIC STYLES
           ============================================ */
        .tracker-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 0;
            border-bottom: 1px solid #1e2630;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .tracker-header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .back-btn {
            color: #8b9bb5;
            text-decoration: none;
            font-size: 1.5rem;
            padding: 0.3rem 0.8rem;
            border: 1px solid #1e2630;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .back-btn:hover {
            background: #1e2630;
            color: #00f5a0;
            border-color: #00f5a0;
        }

        .tracker-title h2 {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .tracker-title p {
            color: #8b9bb5;
            font-size: 0.95rem;
        }

        .tracker-stats {
            display: flex;
            gap: 2rem;
            background: #111920;
            padding: 0.8rem 1.8rem;
            border-radius: 12px;
            border: 1px solid #1e2630;
        }

        .tracker-stats-item {
            text-align: center;
        }

        .tracker-stats-item .number {
            font-size: 1.8rem;
            font-weight: 800;
            color: #00f5a0;
            display: block;
        }

        .tracker-stats-item .label {
            font-size: 0.7rem;
            color: #7a8aa3;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Day List - NEW LAYOUT */
        .day-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .day-item {
            display: grid;
            grid-template-columns: 50px 120px 1fr 120px 80px 50px;
            align-items: center;
            gap: 0.8rem;
            background: #111920;
            padding: 0.7rem 1.2rem;
            border-radius: 10px;
            border: 1px solid #1e2630;
            transition: all 0.2s ease;
        }

        .day-item:hover {
            border-color: #2f4055;
        }

        .day-item.completed {
            border-left: 4px solid #00f5a0;
            opacity: 0.7;
        }

        .day-item.completed .day-status {
            color: #00f5a0;
        }

        /* # Number */
        .day-number {
            font-weight: 700;
            font-size: 0.9rem;
            color: #5a6f85;
            font-family: 'Courier New', monospace;
        }

        /* Date */
        .day-date {
            font-size: 0.75rem;
            color: #8b9bb5;
            font-weight: 500;
            white-space: nowrap;
        }

        .day-date .day-name {
            color: #5a6f85;
        }

        /* Session Name - Editable */
        .day-topic {
            font-size: 0.9rem;
            min-width: 0;
        }

        .day-topic input[type="text"] {
            background: transparent;
            border: none;
            color: #e8edf5;
            font-size: 0.9rem;
            width: 100%;
            padding: 0.2rem 0;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s ease;
            font-weight: 500;
        }

        .day-topic input[type="text"]:focus {
            outline: none;
            border-bottom-color: #00f5a0;
        }

        .day-topic input[type="text"]::placeholder {
            color: #5a6f85;
        }

        /* Topics Covered */
        .day-topics {
            font-size: 0.7rem;
            color: #5a6f85;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .day-topics .topic-tag {
            background: #1a2330;
            padding: 0.1rem 0.5rem;
            border-radius: 10px;
            color: #7a8aa3;
            font-size: 0.65rem;
            margin-right: 0.3rem;
        }

        /* Time & Checkmark */
        .day-status {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 0.8rem;
            color: #7a8aa3;
            justify-content: flex-end;
        }

        .day-status .watch-time {
            color: #00f5a0;
            font-weight: 600;
            font-size: 0.85rem;
            font-variant-numeric: tabular-nums;
        }

        .day-status input[type="checkbox"] {
            appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid #2f4055;
            border-radius: 6px;
            background: transparent;
            cursor: pointer;
            position: relative;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .day-status input[type="checkbox"]:checked {
            background: #00f5a0;
            border-color: #00f5a0;
        }

        .day-status input[type="checkbox"]:checked::after {
            content: "✓";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #0b0e14;
            font-weight: 700;
            font-size: 14px;
        }

        .day-status input[type="checkbox"]:hover {
            border-color: #00f5a0;
        }

        /* Actions */
        .day-actions {
            display: flex;
            gap: 0.3rem;
            justify-content: flex-end;
        }

        .day-actions button {
            background: transparent;
            border: none;
            color: #5a6f85;
            cursor: pointer;
            font-size: 0.8rem;
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .day-actions button:hover {
            color: #00f5a0;
            background: #1e2630;
        }

        .day-actions .delete-btn:hover {
            color: #f56a79;
        }

        /* Add Day Button */
        .add-day-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            padding: 0.8rem;
            background: transparent;
            border: 2px dashed #1e2630;
            border-radius: 10px;
            color: #7a8aa3;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 1rem;
        }

        .add-day-btn:hover {
            border-color: #00f5a0;
            color: #00f5a0;
            background: rgba(0, 245, 160, 0.05);
        }

        /* Quick Stats Bar */
        .progress-summary {
            display: flex;
            gap: 2rem;
            padding: 1rem 1.5rem;
            background: #111920;
            border-radius: 10px;
            border: 1px solid #1e2630;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .progress-summary-item {
            font-size: 0.9rem;
            color: #8b9bb5;
        }

        .progress-summary-item strong {
            color: #e8edf5;
        }

        .progress-summary-item .highlight {
            color: #00f5a0;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: #7a8aa3;
        }

        .empty-state .big-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            display: block;
        }

        .empty-state h3 {
            color: #e8edf5;
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            font-size: 0.95rem;
        }

        /* ============================================
           MODAL POPUP STYLES
           ============================================ */
        .modal-overlay {
            display: none !important;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .modal-overlay.active {
            display: flex !important;
        }

        .modal {
            background: #111920;
            border: 1px solid #2a3543;
            border-radius: 16px;
            padding: 2rem;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            animation: modalSlideIn 0.3s ease;
        }

        @keyframes modalSlideIn {
            from {
                transform: translateY(-30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-header h3 {
            font-size: 1.4rem;
            font-weight: 700;
            color: #e8edf5;
        }

        .modal-close {
            background: transparent;
            border: none;
            color: #7a8aa3;
            font-size: 1.8rem;
            cursor: pointer;
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .modal-close:hover {
            background: #1e2630;
            color: #f56a79;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            color: #8b9bb5;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.7rem 1rem;
            background: #1a2330;
            border: 1px solid #2a3543;
            border-radius: 8px;
            color: #e8edf5;
            font-size: 0.95rem;
            font-family: inherit;
            transition: border-color 0.2s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #00f5a0;
        }

        .form-group input::placeholder {
            color: #5a6f85;
        }

        .form-row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .btn {
            padding: 0.7rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: #00f5a0;
            color: #0b0e14;
            flex: 1;
        }

        .btn-primary:hover {
            background: #00d9f5;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: #1e2630;
            color: #8b9bb5;
        }

        .btn-secondary:hover {
            background: #2a3543;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .day-item {
                grid-template-columns: 40px 100px 1fr 80px 50px;
            }
            .day-topics {
                display: none;
            }
        }

        @media (max-width: 768px) {
            .tracker-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .tracker-stats {
                width: 100%;
                justify-content: space-around;
            }

            .day-item {
                grid-template-columns: 35px 1fr auto;
                grid-template-rows: auto auto;
                gap: 0.3rem;
                padding: 0.7rem 0.8rem;
            }

            .day-number {
                grid-row: 1;
                grid-column: 1;
            }

            .day-date {
                grid-row: 1;
                grid-column: 2;
            }

            .day-topic {
                grid-row: 1;
                grid-column: 3;
            }

            .day-topics {
                grid-row: 2;
                grid-column: 1 / 4;
                display: block;
                white-space: normal;
                font-size: 0.65rem;
                color: #5a6f85;
                padding-left: 35px;
            }

            .day-status {
                grid-row: 1;
                grid-column: 4;
                justify-content: flex-end;
            }

            .day-actions {
                grid-row: 1;
                grid-column: 5;
            }

            .form-row-2 {
                grid-template-columns: 1fr;
            }

            .modal {
                padding: 1.5rem;
                margin: 0.5rem;
            }
        }

        @media (max-width: 480px) {
            .day-item {
                grid-template-columns: 30px 1fr auto;
                grid-template-rows: auto auto auto;
            }

            .day-number {
                font-size: 0.75rem;
            }

            .day-date {
                font-size: 0.65rem;
            }

            .day-topic input[type="text"] {
                font-size: 0.8rem;
            }

            .day-status .watch-time {
                font-size: 0.7rem;
            }

            .day-status input[type="checkbox"] {
                width: 16px;
                height: 16px;
            }

            .day-topics {
                padding-left: 30px;
                font-size: 0.6rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- ============================================ -->
        <!-- TRACKER HEADER -->
        <!-- ============================================ -->
        <div class="tracker-header">
            <div class="tracker-header-left">
                <a href="index.html" class="back-btn">←</a>
                <div class="tracker-title">
                    <h2 id="subject-title">Subject Name</h2>
                    <p id="instructor-info">Instructor Name · Platform</p>
                </div>
            </div>
            <div class="tracker-stats">
                <div class="tracker-stats-item">
                    <span class="number" id="total-days">0</span>
                    <span class="label">Total Sessions</span>
                </div>
                <div class="tracker-stats-item">
                    <span class="number" id="completed-days">0</span>
                    <span class="label">Completed</span>
                </div>
                <div class="tracker-stats-item">
                    <span class="number" id="progress-percent">0%</span>
                    <span class="label">Progress</span>
                </div>
            </div>
        </div>

        <!-- ============================================ -->
        <!-- PROGRESS SUMMARY -->
        <!-- ============================================ -->
        <div class="progress-summary">
            <span class="progress-summary-item">
                📚 <strong id="day-range">No sessions added yet</strong>
            </span>
            <span class="progress-summary-item">
                ✅ Completed: <span class="highlight" id="completed-count">0</span> / <span id="total-count">0</span>
            </span>
            <span class="progress-summary-item">
                ⏱️ Total Watch Time: <strong id="total-time">0h 0m</strong>
            </span>
        </div>

        <!-- ============================================ -->
        <!-- DAY LIST -->
        <!-- ============================================ -->
        <div id="day-list-container" class="day-list">
            <!-- Days will be rendered here by JavaScript -->
        </div>

        <!-- ============================================ -->
        <!-- ADD DAY BUTTON -->
        <!-- ============================================ -->
        <button class="add-day-btn" id="add-day-btn">
            + Add New Session
        </button>

    </div>

    <!-- ============================================ -->
    <!-- MODAL POPUP - Simplified -->
    <!-- ============================================ -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-title">📝 Add New Session</h3>
                <button class="modal-close" id="modal-close">✕</button>
            </div>

            <form id="session-form">
                <!-- Session Name -->
                <div class="form-group">
                    <label for="session-name">Session Name *</label>
                    <input type="text" id="session-name" placeholder="e.g., Graph Theory 01" required />
                </div>

                <!-- Date -->
                <div class="form-group">
                    <label for="session-date">Date *</label>
                    <input type="date" id="session-date" required />
                </div>

                <!-- Duration Row -->
                <div class="form-row-2">
                    <div class="form-group">
                        <label for="duration-hours">Hours</label>
                        <input type="number" id="duration-hours" placeholder="0" min="0" value="0" />
                    </div>
                    <div class="form-group">
                        <label for="duration-minutes">Minutes</label>
                        <input type="number" id="duration-minutes" placeholder="30" min="0" max="59" value="30" />
                    </div>
                </div>

                <!-- Topics Covered -->
                <div class="form-group">
                    <label for="session-topics">Topics Covered</label>
                    <input type="text" id="session-topics" placeholder="e.g., Basics, Graph Theory" />
                </div>

                <!-- Actions -->
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="modal-cancel">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="submit-btn">Add Session</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ============================================
        // SUBJECT TRACKER LOGIC - Simplified
        // ============================================

        // ===== Get Subject from URL =====
        const urlParams = new URLSearchParams(window.location.search);
        const subject = urlParams.get('subject') || 'discrete_maths';
        const instructor = urlParams.get('instructor') || 'sathish';

        // ===== Subject Configuration =====
        const subjectConfig = {
            discrete_maths: {
                title: 'Discrete Mathematics',
                instructor: 'Sathish Yadav · Gate Wallah'
            },
            c_programming: {
                title: 'C-Programming',
                instructor: 'Abhishek Sharma · Gate Wallah'
            },
            digital_logic: {
                title: 'Digital Logic',
                instructor: 'Chandan Jha · GFG Gate'
            },
            engg_maths: {
                title: 'Engineering Mathematics',
                instructor: 'Rahul Sharma · Unacademy'
            },
            data_structures: {
                title: 'Data Structures',
                instructor: 'Abhishek Sharma · Gate Wallah'
            },
            algorithms: {
                title: 'Algorithms',
                instructor: 'Aditya Jain · Gate Wallah'
            },
            coa: {
                title: 'COA',
                instructor: 'Vishwadeep Gothi · Gate Wallah'
            },
            toc: {
                title: 'Theory of Computation',
                instructor: 'Prasad · MadeEasy'
            },
            compiler_design: {
                title: 'Compiler Design',
                instructor: 'Prasad · MadeEasy'
            },
            os: {
                title: 'Operating System',
                instructor: 'Vishwadeep Gothi · MadeEasy'
            },
            dbms: {
                title: 'Databases',
                instructor: 'Vijay Agarwal · Gate Wallah'
            },
            computer_networks: {
                title: 'Computer Networks',
                instructor: 'Ankit Doyla · Gate Wallah'
            },
            aptitude: {
                title: 'General Aptitude',
                instructor: 'Amulya Ratan · Gate Wallah'
            }
        };

        const config = subjectConfig[subject] || subjectConfig.discrete_maths;

        // ===== State =====
        let sessions = [];
        let currentId = 1;

        // ===== DOM Elements =====
        const modalOverlay = document.getElementById('modal-overlay');
        const modalClose = document.getElementById('modal-close');
        const modalCancel = document.getElementById('modal-cancel');
        const modalTitle = document.getElementById('modal-title');
        const submitBtn = document.getElementById('submit-btn');
        const sessionForm = document.getElementById('session-form');

        // ===== Load from localStorage =====
        function loadData() {
            const saved = localStorage.getItem(`tracker_${subject}`);
            if (saved) {
                const data = JSON.parse(saved);
                sessions = data.sessions || [];
                currentId = data.currentId || sessions.length + 1;
            } else {
                sessions = [];
                currentId = 1;
                saveData();
            }
        }

        function saveData() {
            localStorage.setItem(`tracker_${subject}`, JSON.stringify({
                sessions: sessions,
                currentId: currentId
            }));
            updateMainDashboardProgress();
        }

        // ===== Update Main Dashboard Progress =====
        function updateMainDashboardProgress() {
            const total = sessions.length;
            const completed = sessions.filter(s => s.completed).length;
            
            const progressData = {
                total: total,
                completed: completed,
                lastUpdated: new Date().toISOString()
            };
            
            localStorage.setItem(`progress_${subject}`, JSON.stringify(progressData));
            
            const allProgress = JSON.parse(localStorage.getItem('all_subject_progress') || '{}');
            allProgress[subject] = progressData;
            localStorage.setItem('all_subject_progress', JSON.stringify(allProgress));
        }

        // ===== Format Date =====
        function formatDate(dateString) {
            const date = new Date(dateString);
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            return `${days[date.getDay()]} ${date.getDate()} ${months[date.getMonth()]}`;
        }

        // ===== Format Duration =====
        function formatDuration(hours, minutes) {
            if (hours === 0 && minutes === 0) return '0m';
            if (hours === 0) return `${minutes}m`;
            if (minutes === 0) return `${hours}h`;
            return `${hours}h ${minutes}m`;
        }

        // ===== Render Sessions =====
        function renderSessions() {
            const container = document.getElementById('day-list-container');
            container.innerHTML = '';

            if (sessions.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <span class="big-icon">📖</span>
                        <h3>No sessions added yet</h3>
                        <p>Click the <strong>"+ Add New Session"</strong> button to start tracking your study.</p>
                    </div>
                `;
                updateStats();
                return;
            }

            sessions.sort((a, b) => a.day - b.day);

            sessions.forEach(session => {
                const div = document.createElement('div');
                div.className = `day-item ${session.completed ? 'completed' : ''}`;
                div.dataset.id = session.id;

                // Calculate total minutes
                const totalMinutes = session.durationHours * 60 + session.durationMinutes;

                div.innerHTML = `
                    <!-- # Number -->
                    <span class="day-number">#${session.day}</span>
                    
                    <!-- Date -->
                    <span class="day-date">${formatDate(session.date)}</span>
                    
                    <!-- Session Name -->
                    <div class="day-topic">
                        <input type="text" value="${session.name}" 
                               placeholder="Enter session name..." 
                               data-id="${session.id}" 
                               class="topic-input" />
                    </div>
                    
                    <!-- Topics Covered -->
                    <div class="day-topics">
                        ${session.topics ? session.topics.split(',').map(t => 
                            `<span class="topic-tag">${t.trim()}</span>`
                        ).join(' ') : ''}
                    </div>
                    
                    <!-- Time & Checkmark -->
                    <div class="day-status">
                        <span class="watch-time">
                            ${formatDuration(session.durationHours, session.durationMinutes)}
                        </span>
                        <input type="checkbox" ${session.completed ? 'checked' : ''} 
                               data-id="${session.id}" class="complete-checkbox" />
                    </div>
                    
                    <!-- Actions -->
                    <div class="day-actions">
                        <button class="edit-btn" data-id="${session.id}" title="Edit session">✎</button>
                        <button class="delete-btn" data-id="${session.id}" title="Delete session">✕</button>
                    </div>
                `;

                container.appendChild(div);
            });

            // Event Listeners
            document.querySelectorAll('.topic-input').forEach(input => {
                input.addEventListener('change', function() {
                    const id = parseInt(this.dataset.id);
                    const session = sessions.find(s => s.id === id);
                    if (session) {
                        session.name = this.value.trim() || session.name;
                        saveData();
                    }
                });
            });

            document.querySelectorAll('.complete-checkbox').forEach(cb => {
                cb.addEventListener('change', function() {
                    const id = parseInt(this.dataset.id);
                    const session = sessions.find(s => s.id === id);
                    if (session) {
                        session.completed = this.checked;
                        saveData();
                        renderSessions();
                        updateStats();
                    }
                });
            });

            document.querySelectorAll('.edit-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const id = parseInt(this.dataset.id);
                    const session = sessions.find(s => s.id === id);
                    if (session) {
                        openEditModal(session);
                    }
                });
            });

            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const id = parseInt(this.dataset.id);
                    if (confirm('Delete this session?')) {
                        sessions = sessions.filter(s => s.id !== id);
                        saveData();
                        renderSessions();
                        updateStats();
                    }
                });
            });

            updateStats();
        }

        // ===== Update Stats =====
        function updateStats() {
            const total = sessions.length;
            const completed = sessions.filter(s => s.completed).length;
            const percent = total > 0 ? Math.round((completed / total) * 100) : 0;
            
            let totalMinutes = 0;
            sessions.forEach(s => {
                totalMinutes += s.durationHours * 60 + s.durationMinutes;
            });
            const totalHours = Math.floor(totalMinutes / 60);
            const totalMins = totalMinutes % 60;

            document.getElementById('total-days').textContent = total;
            document.getElementById('completed-days').textContent = completed;
            document.getElementById('progress-percent').textContent = `${percent}%`;
            document.getElementById('completed-count').textContent = completed;
            document.getElementById('total-count').textContent = total;
            document.getElementById('total-time').textContent = `${totalHours}h ${totalMins}m`;

            if (total > 0) {
                document.getElementById('day-range').textContent = `${total} sessions added`;
            } else {
                document.getElementById('day-range').textContent = 'No sessions added yet';
            }

            document.getElementById('subject-title').textContent = config.title;
            document.getElementById('instructor-info').textContent = config.instructor;
            
            updateMainDashboardProgress();
        }

        // ===== Modal Functions =====
        let editingId = null;

        function openModal(sessionData = null) {
            modalOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';

            if (sessionData) {
                // Edit mode
                editingId = sessionData.id;
                modalTitle.textContent = '✎ Edit Session';
                submitBtn.textContent = 'Update Session';
                document.getElementById('session-name').value = sessionData.name || '';
                document.getElementById('session-date').value = sessionData.date || '';
                document.getElementById('duration-hours').value = sessionData.durationHours || 0;
                document.getElementById('duration-minutes').value = sessionData.durationMinutes || 30;
                document.getElementById('session-topics').value = sessionData.topics || '';
            } else {
                // Add mode
                editingId = null;
                modalTitle.textContent = '📝 Add New Session';
                submitBtn.textContent = 'Add Session';
                document.getElementById('session-name').value = '';
                document.getElementById('session-date').value = new Date().toISOString().split('T')[0];
                document.getElementById('duration-hours').value = 0;
                document.getElementById('duration-minutes').value = 30;
                document.getElementById('session-topics').value = '';
            }
        }

        function closeModal() {
            modalOverlay.classList.remove('active');
            document.body.style.overflow = '';
            editingId = null;
        }

        function openEditModal(session) {
            openModal(session);
        }

        // ===== Form Submit =====
        sessionForm.addEventListener('submit', function(e) {
            e.preventDefault();

            const name = document.getElementById('session-name').value.trim();
            const date = document.getElementById('session-date').value;
            const durationHours = parseInt(document.getElementById('duration-hours').value) || 0;
            const durationMinutes = parseInt(document.getElementById('duration-minutes').value) || 0;
            const topics = document.getElementById('session-topics').value.trim();

            if (!name) {
                alert('Please enter a session name.');
                return;
            }

            if (!date) {
                alert('Please select a date.');
                return;
            }

            if (durationHours === 0 && durationMinutes === 0) {
                alert('Please enter a duration greater than 0.');
                return;
            }

            if (editingId) {
                const session = sessions.find(s => s.id === editingId);
                if (session) {
                    session.name = name;
                    session.date = date;
                    session.durationHours = durationHours;
                    session.durationMinutes = durationMinutes;
                    session.topics = topics;
                    saveData();
                    renderSessions();
                }
            } else {
                const maxDay = sessions.length > 0 ? Math.max(...sessions.map(s => s.day)) : 0;
                const newSession = {
                    id: currentId++,
                    day: maxDay + 1,
                    name: name,
                    date: date,
                    durationHours: durationHours,
                    durationMinutes: durationMinutes,
                    topics: topics,
                    completed: false
                };
                sessions.push(newSession);
                saveData();
                renderSessions();
            }

            closeModal();
        });

        // ===== Modal Close Events =====
        modalClose.addEventListener('click', closeModal);
        modalCancel.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // ===== Add Day Button =====
        document.getElementById('add-day-btn').addEventListener('click', function(e) {
            e.preventDefault();
            openModal();
        });

        // ===== Keyboard shortcut: Escape to close =====
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && modalOverlay.classList.contains('active')) {
                closeModal();
            }
        });

        // ===== Initialize =====
        loadData();
        renderSessions();

        console.log('Subject Tracker loaded successfully!');
        console.log('Subject:', subject);
        console.log('Sessions:', sessions.length);
    </script>

</body>
</html>
